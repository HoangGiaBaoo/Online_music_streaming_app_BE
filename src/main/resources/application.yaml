server:
  port: 8080
  servlet:
    context-path: /musicapp

spring:
  application:
    name: online_music_streaming_app
  datasource:
    url: "jdbc:mysql://localhost:3306/music_app"
    username: root
    password: gbao
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

file:
  upload-dir: D:/music-files

jwt:
  secret: dev-secret-key-music-app-huce-2025-change-in-prod
  expiration: 604800000        # 7 days (access token)
  refresh-expiration: 2592000000  # 30 days (refresh token)